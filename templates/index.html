<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card OCR</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            width: 460px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #c0c7d3;
            border-radius: 10px;
            padding: 40px 20px;
            cursor: pointer;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        .upload-area:hover { border-color: #4a90e2; }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-area label {
            cursor: pointer;
            display: block;
        }

        .upload-icon { font-size: 40px; margin-bottom: 10px; }

        .upload-text {
            color: #555;
            font-size: 14px;
        }

        #file-name {
            margin-top: 10px;
            font-size: 13px;
            color: #4a90e2;
            font-weight: 500;
        }

        .btn {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover { background: #357abd; }

        .btn:disabled {
            background: #9fc1e8;
            cursor: not-allowed;
        }

        .error {
            background: #ffe0e0;
            color: #c0392b;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        /* ── Loading Overlay ───────────────────────────────────────────── */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.97);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0e7ff;
            border-top: 5px solid #4a90e2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #333;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .loading-subtext {
            font-size: 13px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📇 Business Card OCR</h1>
        <p class="subtitle">Upload a business card image to extract contact information</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/predict" method="POST" enctype="multipart/form-data" onsubmit="return showLoading()">
            <div class="upload-area">
                <label>
                    <div class="upload-icon">📤</div>
                    <div class="upload-text">Click to select a JPG or PNG image</div>
                    <div id="file-name">No file selected</div>
                    <input type="file" id="file-input" name="card_image" accept=".jpg,.jpeg,.png" onchange="updateFileName(this)" required>
                </label>
            </div>
            <button type="submit" class="btn" id="submit-btn">Extract Information</button>
        </form>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="loading-text">Extracting information from your card...</p>
        <p class="loading-subtext">This usually takes a few seconds</p>
    </div>

    <script>
        function updateFileName(input) {
            const label = document.getElementById('file-name');
            label.textContent = input.files[0] ? input.files[0].name : 'No file selected';
        }

        function showLoading() {
            const fileInput = document.getElementById('file-input');
            if (!fileInput.files[0]) return false;

            document.getElementById('loading-overlay').classList.add('active');
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('submit-btn').textContent = 'Processing...';
            return true;
        }
    </script>
</body>
</html>
